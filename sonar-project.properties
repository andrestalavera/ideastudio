# SonarCloud configuration (Automatic Analysis).
# Keep analysis focused on first-party source; exclude vendored agent
# definitions and generated/compiled assets that we do not hand-edit.

sonar.exclusions=\
  .agents/**,\
  .claude/**,\
  **/wwwroot/js/cinema.bundle.js,\
  **/wwwroot/js/cinema.bundle.js.map,\
  **/wwwroot/css/**,\
  **/wwwroot/fr/**,\
  **/wwwroot/en/**,\
  **/bin/**,\
  **/obj/**,\
  **/node_modules/**

# Generated/compiled bundles must not count toward duplication either.
sonar.cpd.exclusions=\
  **/wwwroot/js/cinema.bundle.js,\
  **/wwwroot/css/**
