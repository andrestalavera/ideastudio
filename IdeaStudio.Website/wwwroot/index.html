<!DOCTYPE html>
<html lang="fr" data-motion="">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05161a" />
    <meta name="color-scheme" content="dark" />

    <title>IdeaStud.io — Andrés Talavera</title>
    <meta name="description" content="Andrés Talavera — Consultant .NET & Azure, techlead, formateur. Lyon et à distance." />

    <!-- Static social metadata. These are FR-baseline fallbacks for scrapers that read
         only the static shell (LinkedIn, Slack, Facebook). The per-page SeoHead component
         overrides them client-side once Blazor boots. -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="IdeaStud.io — Andrés Talavera" />
    <meta property="og:description" content="Andrés Talavera — Consultant .NET & Azure, techlead, formateur. Lyon et à distance." />
    <meta property="og:url" content="https://ideastud.io/" />
    <meta property="og:image" content="https://ideastud.io/images/andres-talavera.jpeg" />
    <meta property="og:image:alt" content="Andrés Talavera — Consultant .NET & Azure" />
    <meta property="og:site_name" content="IdeaStud.io" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IdeaStud.io — Andrés Talavera" />
    <meta name="twitter:description" content="Andrés Talavera — Consultant .NET & Azure, techlead, formateur. Lyon et à distance." />
    <meta name="twitter:image" content="https://ideastud.io/images/andres-talavera.jpeg" />

    <!-- Base href. On localhost we always use `/`. Otherwise we respect the
         first path segment so Blazor routes resolve under /fr or /en prefixes. -->
    <base />
    <script>
        (function () {
            var base = document.getElementsByTagName('base')[0];
            var host = window.location.host;
            if (host.indexOf('localhost') !== -1 || host.indexOf('127.0.0.1') !== -1) {
                base.setAttribute('href', '/');
            } else {
                // Static hosts (Azure SWA, GitHub Pages) — always resolve from root.
                base.setAttribute('href', '/');
            }
        })();
    </script>

    <!-- Set <html lang> from the URL's culture segment (/en/... → en, else fr) so
         the document language is correct for crawlers, screen readers and hreflang.
         Updated on client-side navigation via window.ideastudioLang.apply(). -->
    <script>
        (function () {
            function fromPath() { return location.pathname.split('/')[1] === 'en' ? 'en' : 'fr'; }
            function apply() { document.documentElement.setAttribute('lang', fromPath()); }
            apply();
            window.ideastudioLang = { apply: apply };
        })();
    </script>

    <!-- Theme bootstrap — runs before first paint to avoid a light/dark flash.
         Resolves: saved choice (localStorage) → OS preference. Exposes
         window.ideastudioTheme { get, preference, set, toggle } and emits an
         'ideastudio:themechanged' event the cinema runtime listens to. -->
    <script>
        (function () {
            var KEY = 'ideastudio-theme';
            var root = document.documentElement;
            function systemTheme() {
                return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
            }
            function saved() {
                try { var s = localStorage.getItem(KEY); return (s === 'light' || s === 'dark') ? s : null; }
                catch (e) { return null; }
            }
            function resolve() { return saved() || systemTheme(); }
            function applyMeta(theme) {
                var tc = document.querySelector('meta[name="theme-color"]');
                if (tc) tc.setAttribute('content', theme === 'light' ? '#f5f8f7' : '#05161a');
                var cs = document.querySelector('meta[name="color-scheme"]');
                if (cs) cs.setAttribute('content', theme);
            }
            function apply(theme) {
                root.setAttribute('data-theme', theme);
                applyMeta(theme);
                try { if (window.ideastudioCinema && window.ideastudioCinema.applyTheme) window.ideastudioCinema.applyTheme(); } catch (e) {}
                try { window.dispatchEvent(new CustomEvent('ideastudio:themechanged', { detail: { theme: theme } })); } catch (e) {}
            }
            function set(theme) {
                if (theme !== 'light' && theme !== 'dark') return;
                try { localStorage.setItem(KEY, theme); } catch (e) {}
                apply(theme);
            }
            apply(resolve());
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function () {
                    if (!saved()) apply(systemTheme());
                });
            }
            window.ideastudioTheme = {
                get: function () { return root.getAttribute('data-theme') || resolve(); },
                preference: function () { return saved() || 'system'; },
                set: set,
                toggle: function () { set(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); return root.getAttribute('data-theme'); }
            };
        })();
    </script>

    <!-- Third-party origins (Calendly, Google Analytics) are consent-gated and load
         on demand, so we don't eagerly preconnect them — that only wastes connections
         and competes with the critical same-origin WASM/CSS/font requests. -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Google Consent Mode v2 — defaults to denied. Updated by IdeaStudio
         analytics module (wwwroot/src/cinema/analytics/index.js) once the user
         decides via the cookie banner. localhost short-circuit lives there. -->
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('consent', 'default', {
            ad_storage: 'denied',
            ad_user_data: 'denied',
            ad_personalization: 'denied',
            analytics_storage: 'denied',
            functionality_storage: 'granted',
            security_storage: 'granted',
            wait_for_update: 500
        });
        gtag('js', new Date());
        gtag('config', 'G-VFWV1QDJFB', { send_page_view: false });
    </script>
    <script>
        // Skip the gtag.js fetch on localhost so dev sessions never hit third-party endpoints.
        (function () {
            var local = ['localhost', '127.0.0.1', '[::1]'].indexOf(location.hostname) !== -1;
            if (local) return;
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=G-VFWV1QDJFB';
            document.head.appendChild(s);
        })();
    </script>

    <!-- Preload critical static assets -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-variable.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/jetbrains-mono.woff2" crossorigin />
    <link rel="preload" as="style" href="/css/styles.min.css" />
    <link rel="modulepreload" href="/js/cinema.bundle.js" />
    <!-- Avatar is an LCP candidate on Home. -->
    <link rel="preload" as="image" href="/images/andres-talavera-256.avif" type="image/avif" fetchpriority="high" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/css/styles.min.css" />

    <!-- Blog RSS feed -->
    <link rel="alternate" type="application/rss+xml" title="IdeaStud.io — Blog" href="/feed.xml" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/images/andres-talavera.jpeg" type="image/jpeg" sizes="180x180" />

    <!-- Blazor WebAssembly runtime -->
</head>

<body>
    <div id="app">
        <div class="ds-boot" aria-live="polite">
            <span class="ds-boot-dot" aria-hidden="true"></span>
            <span class="ds-boot-label">Chargement…</span>
        </div>
    </div>

    <div id="blazor-error-ui" class="ds-error-ui" hidden>
        <span>Une erreur est survenue.</span>
        <a href=".">Recharger</a>
        <button class="dismiss" type="button" aria-label="Fermer">🗙</button>
    </div>

    <script src="/js/error-ui.js" defer></script>
    <script src="_framework/blazor.webassembly.js" defer></script>
</body>

</html>
